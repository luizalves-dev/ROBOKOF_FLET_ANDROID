name: Gerar APK Android

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: robokof-apk-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  JAVA_VERSION: "17"
  FLET_CACHE_DIR: ${{ github.workspace }}/.flet-cache
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONUNBUFFERED: "1"

jobs:
  build-apk:
    name: Compilar APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v6

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            pyproject.toml

      - name: Configurar Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Restaurar cache do Flet, Flutter e Gradle
        uses: actions/cache@v5
        with:
          path: |
            .flet-cache
            ~/flutter
            ~/.pub-cache
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-robokof-flet-${{ hashFiles('requirements.txt', 'pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-robokof-flet-

      - name: Instalar dependências Python
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Exibir versões do ambiente
        run: |
          python --version
          java -version
          flet --version
          flet doctor

      - name: Compilar APK com Flet
        run: |
          flet build apk . \
            --yes \
            --no-rich-output \
            --build-number "${GITHUB_RUN_NUMBER}" \
            -v

      - name: Preparar APK para download
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          mapfile -t APKS < <(find build/apk -type f -name "*.apk" | sort)
          if [ "${#APKS[@]}" -eq 0 ]; then
            echo "Nenhum APK foi encontrado em build/apk." >&2
            find build -maxdepth 5 -type f -print || true
            exit 1
          fi

          if [ "${#APKS[@]}" -eq 1 ]; then
            cp "${APKS[0]}" "dist/RoboKOF-${GITHUB_RUN_NUMBER}.apk"
          else
            for APK in "${APKS[@]}"; do
              NOME="$(basename "$APK")"
              cp "$APK" "dist/RoboKOF-${GITHUB_RUN_NUMBER}-${NOME}"
            done
          fi

          cd dist
          sha256sum ./*.apk > SHA256SUMS.txt
          ls -lh

      - name: Publicar APK nos artefatos
        uses: actions/upload-artifact@v7
        with:
          name: RoboKOF-APK-${{ github.run_number }}
          path: dist/
          if-no-files-found: error
          retention-days: 30
